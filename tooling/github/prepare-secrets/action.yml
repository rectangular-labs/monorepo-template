name: "Prepare Cloudflare Secrets"
description: "Decrypts an env file (if needed), exports variables to GITHUB_ENV, and outputs secret names for wrangler-action."

inputs:
  env_path:
    description: "Path to the .env file to use (e.g., apps/www/.env or apps/www/.env.production)"
    required: true

outputs:
  secret_names:
    description: "Newline-separated list of secret variable names for wrangler-action"
    value: ${{ steps.compute.outputs.secret_names }}

runs:
  using: composite
  steps:
    - name: Validate env file exists
      shell: bash
      run: |
        if [ ! -f "${{ inputs.env_path }}" ]; then
          echo "::error::Environment file not found: ${{ inputs.env_path }}"
          exit 1
        fi

    - name: Compute secret names
      id: compute
      shell: bash
      run: |
        ENV_FILE="${{ inputs.env_path }}"
        # Extract key names (ignore comments and dotenvx key material)
        SECRET_NAMES=$(awk -F= '!/^#/ && !/^\s*$/ && !/^DOTENV_PUBLIC_KEY/ && !/^DOTENV_PRIVATE_KEY/ && !/^VITE_/ && !/^NEXT_PUBLIC_/ {print $1}' "$ENV_FILE")
        if [ -z "$SECRET_NAMES" ]; then
          echo "::warning::No secret names found in $ENV_FILE after filtering."
          echo "secret_names=" >> "$GITHUB_OUTPUT"
        else
          echo "secret_names<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SECRET_NAMES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        fi

    - name: Export decrypted variables to GITHUB_ENV
      shell: bash
      run: |
        ENV_FILE="${{ inputs.env_path }}"
        TMP_FILE=$(mktemp)
        DECRYPT_ERR_FILE=$(mktemp)
        echo "Preparing env export for: $ENV_FILE"
        echo "Working directory: $(pwd)"
        if [ -f "$ENV_FILE" ]; then
          echo "Env file exists."
          echo "Env file size (bytes): $(wc -c < "$ENV_FILE" | tr -d ' ')"
        else
          echo "::error::Env file is missing before decrypt step: $ENV_FILE"
        fi
        if command -v pnpm >/dev/null 2>&1; then
          echo "pnpm binary: $(command -v pnpm)"
        else
          echo "::error::pnpm is not available in PATH"
        fi
        if pnpm --version >/dev/null 2>&1; then
          echo "pnpm version: $(pnpm --version)"
        else
          echo "::warning::Unable to read pnpm version"
        fi
        if pnpm dotenvx --version >/dev/null 2>&1; then
          echo "dotenvx is available via pnpm."
        else
          echo "::warning::dotenvx does not appear to be available via pnpm"
        fi
        # Try to decrypt with dotenvx; if it fails (or not encrypted), fallback to the file as-is
        echo "Running: pnpm dotenvx decrypt --stdout -f \"$ENV_FILE\""
        if pnpm dotenvx decrypt --stdout -f "$ENV_FILE" > "$TMP_FILE" 2>"$DECRYPT_ERR_FILE"; then
          echo "Using decrypted content from dotenvx."
        else
          DECRYPT_EXIT_CODE=$?
          echo "::notice::dotenvx decrypt exit code: $DECRYPT_EXIT_CODE"
          if [ -s "$DECRYPT_ERR_FILE" ]; then
            echo "::notice::dotenvx stderr:"
            sed 's/^/  /' "$DECRYPT_ERR_FILE"
          else
            echo "::notice::dotenvx produced no stderr output."
          fi
          echo "::notice::dotenvx decrypt failed or not needed; using file as-is."
          cp "$ENV_FILE" "$TMP_FILE"
        fi

        # Remove comments/blank lines and filter out dotenvx key material, then strip surrounding quotes
        while IFS= read -r line; do
          # Skip comments and empty lines
          if [[ -z "$line" || "$line" =~ ^# ]]; then
            continue
          fi

          # Skip dotenvx key and public env var material
          if [[ "$line" =~ ^DOTENV_PUBLIC_KEY || "$line" =~ ^DOTENV_PRIVATE_KEY || "$line" =~ ^VITE_ || "$line" =~ ^NEXT_PUBLIC_ ]]; then
            continue
          fi

          key="${line%%=*}"
          value="${line#*=}"
          # Trim potential CR from Windows line endings
          value="${value%$'\r'}"

          # Strip matching surrounding single or double quotes
          if [[ ( "${value:0:1}" == '"' && "${value: -1}" == '"' ) || ( "${value:0:1}" == "'" && "${value: -1}" == "'" ) ]]; then
            value="${value:1:-1}"
          fi

          # Mask the value in GitHub logs to prevent accidental leak if echoed later
          if [[ -n "$value" ]]; then
            echo "::add-mask::$value"
          fi

          echo "${key}=${value}" >> "$GITHUB_ENV"
        done < "$TMP_FILE"
        rm -f "$TMP_FILE" "$DECRYPT_ERR_FILE"
        echo "Exported environment variables to GITHUB_ENV."
